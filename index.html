<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Queenstown Fleet Map</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <div class="logo">

            <img src="images/logo.svg" alt="Queenstown">

            <div>

                <h1>Queenstown Fleet Map</h1>

                <span>Gasolineras autorizadas</span>

            </div>

        </div>

    </header>

    <section class="buscador">

        <input
            type="text"
            id="buscar"
            placeholder="Buscar estación...">

    </section>

    <main>

        <div id="map"></div>

    </main>

    <script src="js/script.js"></script>

    <script async
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA0vq651bxhxkAedDfeZjJoKiKhD6Cxces&callback=inicializarMapa">
    </script>

</body>

</html>
